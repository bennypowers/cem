version: "2"

linters:
  enable:
    - forbidigo
  settings:
    forbidigo:
      analyze-types: true
      forbid:
        # Filesystem abstraction (see AGENTS.md § Go)
        - pattern: ^os\.(ReadFile|WriteFile|Create|Stat|Lstat|MkdirAll|Remove|Rename|ReadDir|Open|CreateTemp|MkdirTemp)$
          pkg: ^os$
          msg: "use platform.FileSystem instead of direct os.* calls (see AGENTS.md)"
        - pattern: ^os\.DirFS$
          pkg: ^os$
          msg: "use platform.DirFS(fsys, dir) instead of os.DirFS (see AGENTS.md)"
        - pattern: ^filepath\.Glob$
          pkg: ^path/filepath$
          msg: "use platform.FileSystem.Glob instead of filepath.Glob (see AGENTS.md)"
        - pattern: ^doublestar\.Glob$
          pkg: ^github\.com/bmatcuk/doublestar/v4$
          msg: "use WorkspaceContext.Glob via platform.DirFS (see AGENTS.md)"
        # Directory traversal (see AGENTS.md § Go)
        - pattern: ^filepath\.WalkDir$
          pkg: ^path/filepath$
          msg: "use platform.WalkDir which prunes .git directories (see AGENTS.md)"
        - pattern: ^fs\.WalkDir$
          pkg: ^io/fs$
          msg: "use platform.WalkDir which prunes .git directories (see AGENTS.md)"
        # Logging — pterm was removed; prevent reintroduction (see AGENTS.md § Go)
        - pattern: ^pterm\.(Warning|Info|Error|Success|Debug)$
          pkg: ^github\.com/pterm/pterm$
          msg: "use internal/logging instead of direct pterm calls (see AGENTS.md)"
  exclusions:
    rules:
      - path: internal/platform/
        linters:
          - forbidigo
      - path: internal/workspace/
        text: doublestar\.Glob
        linters:
          - forbidigo
      # Per-file test exclusions (blanket _test.go exclusion removed in #399)
      # E2E tests run the binary as a subprocess -- direct os.* calls expected
      - path: cmd/.*_test\.go
        linters:
          - forbidigo
      # Integration tests that write to real temp dirs for file watching / OS behavior
      - path: lsp/server_integration_(file_watch|generate_watch)_test\.go
        linters:
          - forbidigo
      - path: serve/filewatcher.*_test\.go
        linters:
          - forbidigo
      # OS integration subtests and golden file update logic
      - path: generate/demodiscovery/discovery_test\.go
        linters:
          - forbidigo
      - path: generate/generate_nil_manifest_regression_test\.go
        linters:
          - forbidigo
      - path: generate/generate_test\.go
        linters:
          - forbidigo
      - path: generate/external_types_test\.go
        linters:
          - forbidigo
      - path: export/export_test\.go
        linters:
          - forbidigo
      - path: internal/config/schema_test\.go
        linters:
          - forbidigo
      - path: internal/modulegraph/transitive_module_graph_test\.go
        linters:
          - forbidigo
      - path: internal/workspace/httpcache_test\.go
        linters:
          - forbidigo
      - path: lsp/document_test\.go
        linters:
          - forbidigo
      - path: lsp/methods/textDocument/publishDiagnostics/tagDiagnostics_test\.go
        linters:
          - forbidigo
      - path: lsp/methods/textDocument/publishDiagnostics/transitive_integration_test\.go
        linters:
          - forbidigo
      - path: lsp/methods/textDocument/references/references_test\.go
        linters:
          - forbidigo
      - path: serve/build_test\.go
        linters:
          - forbidigo
      - path: serve/middleware/importmap/.*_test\.go
        linters:
          - forbidigo
      - path: lsp/methods/textDocument/completion/completion_button_element_regression_test\.go
        linters:
          - forbidigo
      - path: lsp/methods/textDocument/completion/completion_generate_integration_test\.go
        linters:
          - forbidigo
      - path: lsp/methods/textDocument/completion/completion_test\.go
        linters:
          - forbidigo
      - path: lsp/methods/textDocument/completion/completion_test_helpers_test\.go
        linters:
