      - path: lsp/ephemeral_hover_test\.go
        linters:
          - forbidigo
      - path: internal/workspace/.*_test\.go
        linters:
          - forbidigo
      - path: validate/validate_test\.go
        linters:
          - forbidigo
      - path: serve/middleware/routes/chrome_test\.go
        linters:
          - forbidigo
      - path: lsp/incremental_integration_test\.go
        linters:
