<script type="text/markdown" itemprop="description">
Form validation pattern combining demo-field, demo-button, and demo-card.
Demonstrates FACE (form-associated custom elements) with native constraint
validation, custom error messages, and submit/reset lifecycle.
</script>

<demo-card>
  <h2 slot="header">Registration</h2>

  <form id="registrationForm">
    <demo-field label="Username"
                name="username"
                required
                minlength="3"
                maxlength="20"
                pattern="[a-z0-9_]+"></demo-field>

    <demo-field label="Display Name"
                name="displayName"
                required></demo-field>

    <div class="actions" slot="footer">
      <demo-button type="reset"
                   variant="neutral"
                   appearance="outlined">Clear</demo-button>
      <demo-button type="submit"
                   variant="brand">Register</demo-button>
    </div>
  </form>
</demo-card>

<style>
  demo-card {
    max-width: 480px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .actions {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
  }
</style>

<script type="module">
  import '@cem-examples/kitchen-sink/elements/demo-button/demo-button.js';
  import '@cem-examples/kitchen-sink/elements/demo-card/demo-card.js';
  import '@cem-examples/kitchen-sink/elements/demo-field/demo-field.js';

  const form = document.getElementById('registrationForm');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const submit = form.querySelector('[type="submit"]');
    submit.loading = true;
    await new Promise(r => setTimeout(r, 1500));
    submit.loading = false;
  });
</script>
