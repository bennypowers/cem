name: Feature Request
description: Suggest a new feature or improvement
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for `cem`? Describe the problem you're trying to solve and what you'd like to see.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of cem does this relate to?
      options:
        - generate
        - validate
        - serve
        - lsp (editor support)
        - mcp (AI tooling)
        - CLI
        - config
        - documentation
        - other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem are you trying to solve? Why is this needed?
      placeholder: "When I'm working on X, I need to Y, but currently cem doesn't..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Include examples if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried or considered?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related issues, or anything else that helps explain.
