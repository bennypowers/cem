<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Chromeless Example</title>
    <script>globalThis._elementInternals ??= new WeakMap();</script>
    
    <script type="importmap">{"imports":{"lit":"https://cdn.jsdelivr.net/npm/lit@3/index.js"}}</script>
    
    <script type="module">
        import { CEMReloadClient } from '/__cem/websocket-client.js';
        const client = new CEMReloadClient({
            callbacks: {
                onReload: () => (console.log('[CEM] Reloading page...'), window.location.reload()),
                onOpen: () => console.log('[CEM] Connected'),
                onClose: () => console.log('[CEM] Disconnected'),
                onReconnecting: delay => console.log(`[CEM] Reconnecting in ${delay}ms...`),
                onError: error => console.error('[CEM] Error:', error),
                onLogs: logs => logs.forEach(log => console[log.level || 'info']?.(`[CEM Server] ${log.message}`) || console.log(`[CEM Server] ${log.message}`)),
                onTransformError: (error) => console.error('[CEM] Transform Error:', error.title, error.message, error.file),
            },
        });
        client.init();

        window.addEventListener('message', event => {
            if (event.origin !== window.location.origin) return;
            if (event.data?.type !== 'cem-knob-change') return;
            const { knobType, name, value, tagName, instanceIndex = 0 } = event.data;
            const elements = document.querySelectorAll(tagName);
            const element = elements[instanceIndex];
            if (!element) return;
            switch (knobType) {
                case 'attribute':
                    if (typeof value === 'boolean')
                        element.toggleAttribute(name, value);
                    else if (value === '' || value == null)
                        element.removeAttribute(name);
                    else
                        element.setAttribute(name, String(value));
                    break;
                case 'property':
                    if (value === undefined) {
                        try { delete element[name]; } catch { element[name] = undefined; }
                    } else {
                        element[name] = value;
                    }
                    break;
                case 'css-property': {
                    const prop = name.startsWith('--') ? name : `--${name}`;
                    if (value === '' || value == null)
                        element.style.removeProperty(prop);
                    else
                        element.style.setProperty(prop, String(value));
                    break;
                }
                case 'css-state': {
                    const stateName = name.startsWith('--') ? name.slice(2) : name;
                    const states = globalThis._elementInternals?.get(element)?.states;
                    if (states) {
                        if (value) states.add(stateName);
                        else states.delete(stateName);
                    }
                    break;
                }
            }
        });

        if (window.parent !== window)
            window.parent.postMessage({ type: 'cem-iframe-ready' }, window.location.origin);
    </script>
</head>
<body>
<meta itemprop="name" content="Basic Example">
<meta itemprop="description" content="A simple example showing basic usage">

<my-element id="example" variant="primary">
  <span slot="label">Hello World</span>
</my-element>

</body>
</html>
